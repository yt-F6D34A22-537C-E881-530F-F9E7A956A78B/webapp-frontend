<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スクリーニング</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="style.css">

  <!-- ============================
       外部ライブラリ（必須）
  ============================ -->
  <script src="libs/xlsx.full.min.js"></script>
  <script src="libs/lightweight-charts.standalone.production.js"></script>

  <!-- ============================
       スクリーニング処理
  ============================ -->
  <script defer src="screening.js"></script>

  <!-- ============================
       チャート関連（依存順）
  ============================ -->
  <script defer src="js/chart-indicators.js"></script>
  <script defer src="js/chart-data.js"></script>
  <script defer src="js/chart-price.js"></script>
  <script defer src="js/chart-rci.js"></script>
  <script defer src="js/chart-macd.js"></script>
  <script defer src="js/chart-sync.js"></script>

  <!-- メイン制御 -->
  <script defer src="js/chart-main.js"></script>
</head>

<body>
  <div class="app-container">

    <!-- ============================
         ヘッダー
    ============================ -->
    <header class="app-header">
      <h1>スクリーニング</h1>
    </header>

    <!-- ============================
         条件設定
    ============================ -->
    <section class="card controls-card">
      <h2>条件設定</h2>

      <!-- ============================
           条件設定ローディングオーバーレイ
      ============================ -->
      <div id="controlsLoadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>日付データ取得中…</p>
      </div>

      <!-- ============================
           モード切替タブ
      ============================ -->
      <div class="mode-tabs" role="tablist">
        <label class="mode-tab">
          <input type="radio" name="searchMode" value="ratio" checked>
          <span>出来高 × 上髭スクリーニング</span>
        </label>
        <label class="mode-tab">
          <input type="radio" name="searchMode" value="date">
          <span>値上がり率ランキング</span>
        </label>
        <label class="mode-tab">
          <input type="radio" name="searchMode" value="compare">
          <span>CSV・証券コード比較</span>
        </label>
        <label class="mode-tab">
          <input type="radio" name="searchMode" value="heuristics">
          <span>経験則判定（heuristics）</span>
        </label>
      </div>

      <!-- ============================
           モードごとの条件パネル
           表示・非表示は style.css の .mode-panel（:has() セレクタ）で切り替える。
           JS 側の状態管理（initSearchMode）は変更していない。
      ============================ -->
      <div class="mode-panels">

        <!-- モード A：出来高 × 上髭 -->
        <div class="mode-panel" data-mode="ratio">
          <div class="mode-conditions" id="ratioConditions">
            <label>出来高倍率以上
              <input id="volumeRatio" type="number" value="5" step="0.5">
            </label>

            <label>上髭実体比以上
              <input id="shadowRatio" type="number" value="2" step="0.5">
            </label>

            <label>日付
              <select id="ratioDateSelect"></select>
            </label>

            <div data-exclude-markets-slot></div>
          </div>
        </div>

        <!-- モード B：値上がり率ランキング -->
        <div class="mode-panel" data-mode="date">
          <div class="mode-conditions" id="dateConditions">
            <label>日付
              <select id="dateSelect" disabled></select>
            </label>
          </div>
        </div>

        <!-- モード D：CSV/証券コード比較 -->
        <div class="mode-panel" data-mode="compare">
          <div class="mode-conditions" id="compareConditions">

            <fieldset class="compare-source-fieldset" disabled>
              <legend>入力方法</legend>
            
              <label class="compare-source-option">
                <input type="radio" name="compareSource" value="csv" checked>
                <span class="compare-source-label">CSVアップロード</span>
                <input type="file" id="compareCsvFile" accept=".csv">
              </label>
            
              <label class="compare-source-option">
                <input type="radio" name="compareSource" value="code">
                <span class="compare-source-label">証券コード指定</span>
                <input type="text" id="compareCodes" placeholder="例: 7203,9984">
              </label>
            </fieldset>

            <fieldset class="compare-date-fieldset" disabled>
              <legend>比較期間</legend>

              <label>比較元日付
                <select id="compareFromDate"></select>
              </label>

              <span class="compare-date-arrow">→</span>

              <label>比較先日付
                <select id="compareToDateSelect"></select>
              </label>
            </fieldset>

          </div>
        </div>

        <!-- モード：経験則判定 -->
        <div class="mode-panel" data-mode="heuristics">
          <div class="mode-conditions" id="heuristicsConditions">
            <label>日付
              <select id="heuristicsDateSelect" disabled></select>
            </label>
            <label>証券コード（任意・4桁・カンマ区切りで複数可）
              <input id="heuristicsCodes" type="text" placeholder="例: 7203,9984" disabled>
            </label>
            <div data-exclude-markets-slot></div>
          </div>
        </div>

      </div>
      
      <div class="buttons-row">
        <button id="startBtn" class="btn primary">スクリーニング開始</button>
        <button id="cancelBtn" class="btn secondary" disabled>キャンセル</button>
        <span id="elapsedTime" class="elapsed-time"></span>
      </div>
    </section>

    <!-- ============================
         結果テーブル
    ============================ -->
    <section id="resultSection" class="card table-card">
      <div class="result-section-header">
        <h2>スクリーニング結果</h2>
        <span id="resultCount" class="result-count">検索結果：0 件</span>
        <span id="compareMatchRate" class="result-count compare-match-rate hidden"></span>
        <button id="csvDownloadBtn" class="btn ghost csv-download-btn" title="CSVダウンロード" disabled>
          <!-- ダウンロードアイコン（SVG / Material Design "download" 相当） -->
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>

      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>サーバーへリクエスト中…</p>
      </div>

      <!-- 固定ヘッダ専用テーブル -->
      <div class="table-header-sticky" id="resultTableStickyWrap">
        <table id="resultTableSticky" class="result-table">
          <thead id="resultHeaderSticky"></thead>
        </table>
      </div>

      <!-- 本体テーブル（横スクロール） -->
      <div class="table-scroll-outer" id="resultTableScrollOuter">
        <table id="resultTable" class="result-table">
          <thead id="resultHeaderBody" aria-hidden="true"></thead>
          <tbody></tbody>
        </table>
      </div>

      <p class="hint">行をタップ／クリックするとチャートを表示します。</p>
      <p class="hint">heuristics モードでは ○＝一致、×＝不一致 を表示します。</p>
    </section>

    <!-- ============================
         チャートモーダル
    ============================ -->
    <div id="chartModal" class="modal">
      <div class="modal-backdrop" id="chartModalBackdrop"></div>

      <div class="modal-content">

        <div class="modal-header">
          <div id="chartHeaderLeft"></div>

          <div id="chartHeaderNav">
            <div class="timeframe-selector">
              <label><input type="radio" name="timeframe" value="1d" checked> 日足</label>
              <label><input type="radio" name="timeframe" value="1wk"> 週足</label>
              <label><input type="radio" name="timeframe" value="1mo"> 月足</label>
            </div>

            <button id="prevChartBtn" class="btn small">前へ</button>
            <button id="nextChartBtn" class="btn small">次へ</button>
          </div>

          <button id="closeChartBtn" class="btn ghost">✕</button>
        </div>

        <div class="modal-body">

          <div id="chartLoadingOverlay">
            <div class="spinner"></div>
            <p>チャートデータ取得中…</p>
          </div>

          <div id="chartContainer"></div>
          <div id="rciContainer"></div>
          <div id="macdContainer"></div>

          <div id="chartSettingsBtn" class="chart-settings-btn">⚙️</div>

          <div id="chartSettingsModal" class="chart-settings-modal hidden">
            <div class="settings-content">
              <label><input type="checkbox" id="toggleCandles" checked> ローソク足を表示</label>
              <label><input type="checkbox" id="toggleMA" checked> 移動平均線（MA）を表示</label>
              <label><input type="checkbox" id="toggleBB" checked> ボリンジャーバンドを表示</label>
              <label><input type="checkbox" id="toggleIchimoku" checked> 一目均衡表を表示</label>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</body>
</html>
