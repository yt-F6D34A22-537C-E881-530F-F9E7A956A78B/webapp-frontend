<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>出来高＆上髭スクリーニング</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">

  <script defer src="screening.js"></script>
  <script defer src="chart-modal.js"></script>
</head>

<body>
  <div class="app-container">

    <!-- =========================
         ヘッダー
    ========================== -->
    <header class="app-header">
      <h1>出来高＆上髭スクリーニング</h1>
    </header>

    <!-- =========================
         条件設定カード
    ========================== -->
    <section class="card controls-card">
      <h2>条件設定</h2>

      <div class="controls-grid">

        <!-- 出来高 × 上髭 -->
        <div class="mode-block">
          <label class="mode-title">
            <input type="radio" name="searchMode" value="ratio" checked>
            出来高 × 上髭スクリーニング
          </label>

          <div class="mode-conditions" id="ratioConditions">
            <label>出来高倍率以上
              <input id="volumeRatio" type="number" value="5" step="0.1">
            </label>

            <label>上髭実体比以上
              <input id="shadowRatio" type="number" value="5" step="0.1">
            </label>
          </div>
        </div>

        <!-- 日付指定ランキング -->
        <div class="mode-block">
          <label class="mode-title">
            <input type="radio" name="searchMode" value="date">
            値上がり率ランキング（日付指定）
          </label>

          <div class="mode-conditions" id="dateConditions">
            <label>日付
              <select id="dateSelect" disabled>
                <option>読み込み中...</option>
              </select>
            </label>
          </div>
        </div>

      </div>

      <div class="buttons-row">
        <button id="startBtn" class="btn primary">スクリーニング開始</button>
        <button id="cancelBtn" class="btn secondary" disabled>キャンセル</button>
        <span id="elapsedTime" class="elapsed-time"></span>
      </div>

      <div id="progressArea" class="progress-area">
        <div id="progressText" class="progress-text">待機中</div>
      </div>
    </section>

    <!-- =========================
         結果テーブル
    ========================== -->
    <section class="card table-card">
      <h2>スクリーニング結果</h2>

      <!-- ローディング -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>サーバーへリクエスト中…</p>
      </div>

      <!-- ★ 固定ヘッダ専用テーブル -->
      <div class="table-header-sticky">
        <table>
          <thead id="resultHeaderSticky"></thead>
        </table>
      </div>

      <!-- ★ 本体テーブル（横スクロール） -->
      <div class="table-scroll-outer">
        <table id="resultTable">
          <thead id="resultHeaderBody" aria-hidden="true"></thead>
          <tbody></tbody>
        </table>
      </div>

      <p class="hint">行をクリックするとチャートを表示します。</p>
    </section>

    <!-- =========================
         チャートモーダル
    ========================== -->
    <div id="chartModal" class="modal">
      <div class="modal-backdrop"></div>

      <div class="modal-content">

        <div class="modal-header">
          <div id="chartHeaderLeft"></div>
          <div id="chartHeaderNav"></div>
          <button id="closeChartBtn" class="btn ghost">✕</button>
        </div>

        <div class="modal-body">

          <div id="chartContainer"></div>

          <div id="rciContainer"></div>
          <div id="macdContainer"></div>

          <div id="chartLoadingOverlay">
            <div class="spinner"></div>
            <p>読み込み中…</p>
          </div>

        </div>
      </div>
    </div>

  </div>
</body>
</html>
